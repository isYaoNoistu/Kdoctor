version: 1

default_profile: master-internal-kraft-prod

profiles:
  master-internal-kraft-prod:
    bootstrap_external:
      - "192.168.119.7:9192"
      - "192.168.119.7:9194"
      - "192.168.119.7:9196"
    bootstrap_internal:
      - "192.168.119.7:9192"
      - "192.168.119.7:9194"
      - "192.168.119.7:9196"
    controller_endpoints:
      - "192.168.119.7:9193"
      - "192.168.119.7:9195"
      - "192.168.119.7:9197"
    broker_count: 3
    expected_min_isr: 2
    expected_replication_factor: 3
    host_network: true
    plaintext_external: true

docker:
  enabled: true
  compose_file: ""
  container_names:
    - "kafka1"
    - "kafka2"
    - "kafka3"

logs:
  enabled: true
  tail_lines: 300
  lookback_minutes: 15
  log_dir: ""

probe:
  enabled: true
  topic: "_kdoctor_probe"
  group_prefix: "kdoctor-probe"
  timeout: "15s"
  message_bytes: 1024
  produce_count: 1
  cleanup: false

execution:
  timeout: "30s"
  metadata_timeout: "5s"
  tcp_timeout: "3s"
